# Site settings
title: YunLambert
description: Talk is cheap, show me the code.
cover: assets/images/radhakrishna.jpg
#logo: assets/images/avatar.jpg
#favicon: assets/images/avatar.jpg
baseurl: "/" # the subpath of your site, e.g. /blog/ or / for root
url: "http://www.cnblogs.com/yunlambert" # the base hostname & protocol for your site
paginate:	5 # The number of posts to show per page on your homepage

# Social
facebook: yunlambert
twitter: yunlambert
github:  yunlambert

#Additional Pages
about: ／
contact: ／
privacy-policy: ／


permalink: /:title


# Google Analytics
analytics_id: ""

# Build settings
markdown: kramdown

kramdown:
  parse_block_html: true

plugins:
  - jekyll-paginate


# Settings for rake task
safe: False
lsi: False
username: YunLambert #github username
repo: YunLambert.github.io #github repository
branch: master #branch
relative_source: ../hanuman/ #source directory
destination: ../hanuman-pages/ #destination directory
production_url:  https://samanyougarg.com/
source_url:  https://github.com/yunlambert #source repository url

exclude:
  - README.md
  - Rakefile
  - Gemfile
  - Gemfile.lock
  - changelog.md
  - "*.Rmd"
  - vendor
  - .travis.yml
